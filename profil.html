<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Savings</title>
    <link rel="shortcut icon" href="logo1.png">
    <link rel="stylesheet" href="profil.css">

</head>

<body>
    <header class="Barre_en_haut">
        <a class="retour" href="compte.html">
            <h4> &#8617;Retour</h4>
        </a>
        <span class="trois_barres"> <a href="compte.html"><img src="trois_barres.png" alt=""></a> </span>
    </header>
    <main class="Bloc_en_bas">
        <video autoplay muted loop class="video-bg">
            <source src="./vdobleu.mp4" type="video/mp4">
        </video>
        <img src="compte_crayon.png" alt="">
        <form action="">
            <h2>Vérifiez vos informations</h2>
            <label for="prenom">Prénom(s) :</label>
            <input class="renseignement" type="text" id="prenom">
            <br>
            <label for="nom">Nom(s) :</label>
            <input class="renseignement" type="text" id="nom">
            <br>
            <label for="nomu">Nom d'utilisateur :</label>
            <input class="renseignement" type="text" id="nomu">
            <br>
            <label for="email">Email :</label>
            <input class="renseignement" type="email" id="email">
            <br>
            <label for="ndt">Numéro de téléphone :</label>
            <input class="renseignement" type="tel" id="ndt">
            <br>
            <label>
                <input class="cbx" type="checkbox" name="choix" value="option1">Afficher l'email sur l'écran d'accueil
            </label>
            <br>
            <label>
                <input class="cbx" type="checkbox" name="choix" value="option2">Afficher le numéro de téléphone sur
                l'écran d'accueil
            </label>
            <br>
            <section>
                <input class="sbt " type="submit" value="Enregistrer mes modifications">
            </section>
        </form>
    </main>
    <script>
        // Récupérer les informations de l'utilisateur
        let utilisateur = JSON.parse(localStorage.getItem("utilisateur")) || {};

        // Remplir automatiquement le formulaire
        function remplirFormulaire() {
            document.getElementById("prenom").value = utilisateur.prenom || "";
            document.getElementById("nom").value = utilisateur.nom || "";
            document.getElementById("email").value = utilisateur.email || "";
            document.getElementById("ndt").value = utilisateur.telephone || "";

            let cases = document.querySelectorAll(".cbx");

            cases[0].checked = utilisateur.emailVisible || false;
            cases[1].checked = utilisateur.telVisible || false;
        }
        // Lancer la fonction
        remplirFormulaire();

        // Quand on clique sur "Enregistrer"
        document.querySelector("form").addEventListener("submit", function (event) {

            // Empêcher le rechargement de la page
            event.preventDefault();

            // Récupérer les nouvelles valeurs
            utilisateur.prenom = document.getElementById("prenom").value;
            utilisateur.nom = document.getElementById("nom").value;
            utilisateur.email = document.getElementById("email").value;
            utilisateur.telephone = document.getElementById("ndt").value;

            let cases = document.querySelectorAll(".cbx");

            utilisateur.emailVisible = cases[0].checked;
            utilisateur.telVisible = cases[1].checked;

            // Sauvegarder dans localStorage
            localStorage.setItem("utilisateur", JSON.stringify(utilisateur));
            alert("Modifications enregistrées !");
        });
    </script>
</body>

</html>
